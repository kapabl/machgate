# Sugar engine dylib mappings — SDL3 version (Shotgun King v2+)
#
# Sugar games have 6 dynamic dependencies:
#   libSystem.B, libc++.1, libSDL3.0, libfreetype.6, OpenGL.framework, libsteam_api
#
# Pattern matching: first substring match wins.

# System shims
libSystem.B = LIBSYSTEM_SHIM
# Sugar engine uses Apple alternate SSO libc++ (data at offset 0, size at 8, cap at 16).
# Use our Apple-ABI build with _LIBCPP_ABI_ALTERNATE_STRING_LAYOUT + pthread compat patches.
libc++.1 = LIBCXX_STANDARD

# SDL3 and FreeType — pure C APIs, map directly to native Linux .so
libSDL3.0 = libSDL3.so.0
libfreetype.6 = libfreetype.so.6

# OpenGL — deferred until SDL creates GL context (needed for gl4es on KMSDRM).
# On desktop (Mesa), the deferred load is harmless — Mesa's constructor doesn't
# need an existing EGL display.
OpenGL = DEFERRED:OPENGL_LIB

# Steam API — stubbed (return 0/NULL for all calls)
libsteam_api = STUB
