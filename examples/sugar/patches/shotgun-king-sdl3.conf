# Shotgun King (SDL3 version) arm64 patches for machismo.
#
# Symbolic format: see machismo/src/patcher.h. Addresses are resolved from
# the Mach-O nlist at load time, so this file survives recompiles as long as
# the symbol names stay stable.

# --- Steam API ---
# sugar::steam::init_steam(unsigned int) — skip Steam init.
# SteamInternal_SteamAPI_Init is STUBbed (returns 0); init_steam interprets
# that as success, then SteamInternal_ContextInit returns NULL and the
# dereference crashes. Return false (0) immediately instead.
#
# The function body below the prologue becomes our 24-byte island pool for
# the mono-audio fix.
at sym:__ZN5sugar5steam10init_steamEj     D2800000  ; expect D10183FF  # mov w0, #0
at sym:__ZN5sugar5steam10init_steamEj+4   ret       ; expect A90357F6

# --- Mono audio buffer size fix ---
# sugar::audio::_load_ogg computes the S16 buffer size as `frames << 2`,
# assuming stereo stb_vorbis output. For mono files this doubles the alloc
# and SDL3's converter reads past the buffer → SIGSEGV.
# Fix: replace the `lsl w8, w22, #2` with a branch to an island that
# computes `frames * channels * 2` from the stored channels field.
#
# Stack layout at the call site: [x29, -0x44] = channels, [x29, -0x48] = sample_rate.
# Island body lives in the dead init_steam body (+8..+0x18).
let src    = sym:__ZN5sugar5audio9_load_oggENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEEPNS0_8sample_tEbPNS0_6spec_tE find 531E76C8
let island = sym:__ZN5sugar5steam10init_steamEj+8

at src           b island                 ; expect 531E76C8
at island+0x0    B85BC3A8   # ldur w8, [x29, -0x44]   (channels)
at island+0x4    1B087EC8   # mul  w8, w22, w8        (frames * channels)
at island+0x8    531F7908   # lsl  w8, w8, #1         (*= sizeof int16_t)
at island+0xc    B9000A68   # str  w8, [x19, #8]      (buffer byte size)
at island+0x10   b src+8    # return past the original `str w8, [x19, 8]`
