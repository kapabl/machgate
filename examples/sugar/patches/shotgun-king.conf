# Shotgun King arm64 patches for machismo
# Format: <virtual_address> <arm64_instruction_hex>  # comment
#
# Addresses are from the unslid binary (preferred load at 0x100000000).
# The patcher adds the ASLR slide automatically.

# --- Steam API ---
# sugar::steam::init_steam(unsigned int) at 0x1000907ec — skip Steam init.
# SteamInternal_SteamAPI_Init is STUBbed (returns 0), which init_steam
# interprets as success, then SteamInternal_ContextInit returns NULL and
# the dereference at 0x100090888 crashes.  Return false (0) immediately.
0x1000907ec D2800000  # mov w0, #0 (return false = not initialized)
0x1000907f0 D65F03C0  # ret
