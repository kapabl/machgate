# Binary patches for The Wratch's Den (Sugar engine, SDL2).
#
# Symbolic format: see machismo/src/patcher.h.

# --- Steam API ---
# sugar::steam::init_steam — replace the prologue with `mov w0, #0; ret`
# so the caller sees "Steam not initialized" and continues without trying
# to dereference the NULL ContextInit result.
at sym:__ZN5sugar5steam10init_steamEj     D2800000  ; expect D10183FF   # mov w0, #0
at sym:__ZN5sugar5steam10init_steamEj+4   ret       ; expect A90357F6
