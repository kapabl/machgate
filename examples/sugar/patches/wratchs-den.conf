# Binary patches for The Wratch's Den (Sugar engine, SDL2).
#
# Symbolic format: see machismo/src/patcher.h.

# --- Steam API ---
# sugar::steam::init_steam — replace the prologue with `mov w0, #0; ret`
# so the caller sees "Steam not initialized" and continues without trying
# to dereference the NULL ContextInit result.
at sym:__ZN5sugar5steam10init_steamEj     D2800000  ; expect D10183FF   # mov w0, #0
at sym:__ZN5sugar5steam10init_steamEj+4   ret       ; expect A90357F6

# --- Shutdown ordering ---
# sugar::shutdown_sugar runs Lua teardown before sugar::input::shutdown_input,
# so the per-controller _close_controller loop calls call_lua_running with a
# freed lua_State and segfaults in lua_getfield. SDL doesn't get an explicit
# close per controller, but the process is exiting — the OS reclaims them.
# Patch the loop's leading `cbz x8, +0x20` to `b +0x20` so we always skip.
at sym:__ZN5sugar5input14shutdown_inputEv+0x64   14000008   ; expect B4000108   # b +0x20
